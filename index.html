<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">
    <title>KD Natural Scrub - បញ្ជាទិញ</title>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --aba: #005d7d; --acleda: #003b71; --gold: #b8860b; --dark: #2c3e50; }
        body { font-family: 'Kantumruy Pro', sans-serif; background: #ffffff; margin: 0; padding: 0; color: #333; overflow-x: hidden; }
        .header-container { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid #eee; background: #fffcf5; }
        .side-img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; border: 1px solid var(--gold); }
        .header-title { flex: 1; text-align: center; font-size: 14px; font-weight: bold; color: var(--dark); line-height: 1.4; }
        .header-title span { display: block; font-size: 16px; color: var(--gold); }
        .container { max-width: 450px; margin: auto; padding: 5px 10px; }
        .section { background: #fafafa; padding: 8px; border-radius: 12px; border: 1px solid #f0f0f0; margin-bottom: 6px; }
        .title { font-weight: bold; color: var(--gold); margin-bottom: 5px; font-size: 12px; display: block; }
        .qty-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
        .qty-btn { padding: 8px 1px; border: 1px solid #ddd; background: white; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 11px; }
        .qty-btn.active { background: var(--gold); color: white; border-color: var(--gold); }
        .type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        .type-item { display: flex; justify-content: space-between; align-items: center; background: #fff; border: 1px solid #eee; padding: 3px 8px; border-radius: 6px; font-size: 12px; }
        .type-input { width: 35px; text-align: center; border: 1px solid #ccc; border-radius: 4px; padding: 3px; font-weight: bold; outline: none; }
        .location-selector { display: flex; gap: 5px; margin-bottom: 5px; }
        .loc-btn { flex: 1; padding: 10px 2px; border: 1px solid #ddd; border-radius: 8px; background: white; cursor: pointer; font-size: 10px; font-weight: bold; }
        .loc-btn.active { border-color: var(--gold); background: #fffcf0; color: var(--gold); }
        input { width: 100%; padding: 10px; margin: 2px 0; border-radius: 8px; border: 1px solid #eee; box-sizing: border-box; font-size: 13px; outline: none; }
        .btn-submit { color: white; border: none; padding: 14px; width: 100%; border-radius: 10px; font-size: 14px; font-weight: bold; cursor: pointer; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-aba { background: var(--aba); }
        .btn-acleda { background: var(--acleda); }
        .btn-cod { background: #27ae60; }
        .hint-text { font-size: 10px; color: #d63031; text-align: center; margin-top: 5px; font-weight: bold; }
        #loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading-overlay"><div style="border: 4px solid #f3f3f3; border-top: 4px solid var(--gold); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;"></div></div>

<div class="header-container">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR61fIqIu9G7T-S0vEunwS1M8E6vH4-m0vW3w&s" class="side-img">
    <div class="header-title"><span>KDស្ក្រាប់ធម្មជាតិ</span>KD Natural Scrub</div>
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR61fIqIu9G7T-S0vEunwS1M8E6vH4-m0vW3w&s" class="side-img">
</div>

<div class="container">
    <div class="section">
        <span class="title">១. ជ្រើសរើសកញ្ចប់</span>
        <div class="qty-grid" id="qty-container"></div>
    </div>

    <div class="section">
        <span class="title">២. រើសប្រភេទស្ក្រាប់ (បញ្ចូលលេខ)</span>
        <div class="type-grid" id="type-container"></div>
    </div>

    <div class="section">
        <div class="location-selector">
            <button class="loc-btn" id="btn-pp" onclick="selectLoc('ភ្នំពេញ')">📍 ភ្នំពេញ (COD)</button>
            <button class="loc-btn" id="btn-province" onclick="selectLoc('ខេត្ត')">🚛 ខេត្ត (បង់មុន)</button>
        </div>
        <input type="tel" id="phone" placeholder="លេខទូរស័ព្ទ *">
        <input type="text" id="address" placeholder="អាសយដ្ឋានដឹកជញ្ជូន *">
    </div>

    <div style="text-align: center; margin: 5px 0;"><b style="color: var(--dark); font-size: 18px;">សរុប៖ <span id="display-total">0</span> ៛</b></div>
    
    <div id="cod-group" style="display: block;">
        <button class="btn-submit btn-cod" onclick="handleSubmit('COD')">កម្ម៉ង់ឥឡូវ (ចាំឱ្យលុយនៅភ្នំពេញ)</button>
    </div>

    <div id="province-group" style="display: none;">
        <button class="btn-submit btn-aba" onclick="handleSubmit('ABA')">បង់ប្រាក់តាម ABA Mobile</button>
        <button class="btn-submit btn-acleda" onclick="handleSubmit('AC_LEDA')">បង់តាមអេស៊ីលីដា (Acleda)</button>
        <div class="hint-text">⚠️ បង់រួចសូមថយក្រោយវិញ ដើម្បីផ្ញើវិក្កយបត្រមក Telegram ហាង</div>
    </div>
</div>

        10: "https://acledabank.com.kh/acleda?payment_data=qWY5B2SAUfIhLblxzOtfux3xJRdAPs8G9Uek1toYoITHY0KWVLmEsgo99YEZnVJEt+7NRis1W6+l/bRZrqp6FwX1DhyttdftAg3Fu2mFPvcGIIUfsqMTiIXLe5kJ+H47+VCSBJvDhKoElx76d1v5G/+rhL7LLC36aYaXGU+RjD2irgJfM/rIXjw+xhr40fYCB1NbTkjFKyEdM0iGPWXlJifOKQfi5dUj9zOdYweEsLlrhpm+U27Bhvo5eFLF2hfY6ZxKc7KN3C2N/MzZv03hgQ==&key=khqr",

        20: "https://acledabank.com.kh/acleda?payment_data=qWY5B2SAUfIhLblxzOtfux3xJRdAPs8G9Uek1toYoITHY0KWVLmEsgo99YEZnVJEt+7NRis1W6+l/bRZrqp6FwX1DhyttdftAg3Fu2mFPvcGIIUfsqMTiIXLe5kJ+H47Rc7/N3bET0nyUkTAy1ga97VohyDC8T25yAQrMSL2xO0VNx9VZ3xIVGB8SVqj3NrIbkqe5d+ALvgwJMRmMW0Bn1CNPMJY/oBaquSyqkcLEclHzh6FrrQrYCz1gv9t56epyETZ5wDptxwXREoLuhN4w==&key=khqr",
        30: "https://acledabank.com.kh/acleda?payment_data=qWY5B2SAUfIhLblxzOtfux3xJRdAPs8G9Uek1toYoITHY0KWVLmEsgo99YEZnVJEt+7NRis1W6+l/bRZrqp6FwX1DhyttdftAg3Fu2mFPvcGIIUfsqMTiIXLe5kJ+H47fG+TU4za1as7LTsEwwvK0LET+SpWkYl6adl8U2kXgM04q9Mlcn76du4hlJGowxIVuiVojXWRvLjrdllWYKrlj7g8YHNGepIySVu10YvTn6toPHb8xsMo2BnEfVIYJBK8bgOgBvJI0sDXh65LPLFj7w==&key=khqr",
        50: "https://acledabank.com.kh/acleda?payment_data=qWY5B2SAUfIhLblxzOtfux3xJRdAPs8G9Uek1toYoITHY0KWVLmEsgo99YEZnVJEt+7NRis1W6+l/bRZrqp6FwX1DhyttdftAg3Fu2mFPvcGIIUfsqMTiIXLe5kJ+H47uO0z2u7jgna0CZPSsVXF7OWFPuvYWQTY0pUzHRSmXn12ZA8YLvgje2vwKrJUTdEF7iYsRhHK8GwlwETjvQXK92WxkyBsnrHaVlmz1qlEHFsvJFLsX0gjmr9T9bWQGk3gU6bqBoJCGlGpUy8l2lVnvg==&key=khqr",
        60: "https://acledabank.com.kh/acleda?payment_data=qWY5B2SAUfIhLblxzOtfux3xJRdAPs8G9Uek1toYoITHY0KWVLmEsgo99YEZnVJEt+7NRis1W6+l/bRZrqp6FwX1DhyttdftAg3Fu2mFPvcGIIUfsqMTiIXLe5kJ+H47M0X78ogYLvWv+wLSpCiw+L7emvq1sAj3L0yiWPlyzInsJygk+wqQSaxmRLbT9tTfNo4pIsXG0p2XP/hyvPNwK/Yvpbd+u0O0ztBin5HCJS2bmaf8QYmz/Dn3jc+Ohc4TAep9lZW/HU6U3tE+5EufZA==&key=khqr",
        120: "https://acledabank.com.kh/acleda?payment_data=qWY5B2SAUfIhLblxzOtfux3xJRdAPs8G9Uek1toYoITHY0KWVLmEsgo99YEZnVJEt+7NRis1W6+l/bRZrqp6FwX1DhyttdftAg3Fu2mFPvcGIIUfsqMTiIXLe5kJ+H47/gVojjGeiP8WBPhadCf6tm8hsxoLFO1HEALufxB6JAQ5ZXxv4VtdwEeG/tsnOND7tReVAUxkyChxZczISuRwdWxm8H3X3UkDMfFmibAdstERnLU1h4pK/8oSM1JQF0o0aujskOd+n32Hq8HAAfZslA==&key=khqr"
    };

    const types = ["កាហ្វេ", "ពន្លៃ", "ហាយឡាយ", "ប័រ", "អំពិលទុំ", "ស្រូវសាលី", "ស្ត្រប៊ឺរី"];
    let selectedQty = 0, selectedArea = "ភ្នំពេញ", isWaiting = false;

    const qtyDiv = document.getElementById('qty-container');
    Object.keys(prices).forEach(q => {
        const b = document.createElement('button'); b.className = 'qty-btn'; b.innerText = q + " កំប៉ុង";
        b.onclick = () => { selectedQty = parseInt(q); document.querySelectorAll('.qty-btn').forEach(btn => btn.classList.remove('active')); b.classList.add('active'); document.getElementById('display-total').innerText = prices[selectedQty].toLocaleString(); };
        qtyDiv.appendChild(b);
    });

    const typeDiv = document.getElementById('type-container');
    types.forEach(t => { typeDiv.innerHTML += `<div class="type-item"><span>${t}</span><input type="text" class="type-input" value="0" oninput="convertAndValidate(this)"></div>`; });

    function convertAndValidate(el) {
        const khNumbers = {'០':'0','១':'1','២':'2','៣':'3','៤':'4','៥':'5','៦':'6','៧':'7','៨':'8','៩':'9'};
        let val = el.value; for (let key in khNumbers) { val = val.split(key).join(khNumbers[key]); }
        el.value = val.replace(/[^0-9]/g, '');
    }

    function selectLoc(area) {
        selectedArea = area;
        document.getElementById('btn-pp').classList.toggle('active', area === 'ភ្នំពេញ');
        document.getElementById('btn-province').classList.toggle('active', area === 'ខេត្ត');
        document.getElementById('cod-group').style.display = (area === 'ភ្នំពេញ') ? 'block' : 'none';
        document.getElementById('province-group').style.display = (area === 'ខេត្ត') ? 'block' : 'none';
    }

    async function handleSubmit(method) {
        const phone = document.getElementById('phone').value, addr = document.getElementById('address').value;
        let current = 0; document.querySelectorAll('.type-input').forEach(i => current += parseInt(i.value) || 0);
        if (!selectedQty || current !== selectedQty || !phone || !addr) return alert("សូមបំពេញព័ត៌មានឱ្យត្រឹមត្រូវ និងគ្រប់ចំនួនកំប៉ុង!");

        document.getElementById('loading-overlay').style.display = 'flex';
        if (method === 'ABA') { isWaiting = true; window.location.href = abaLinks[selectedQty]; }
        else if (method === 'AC_LEDA') { isWaiting = true; window.location.href = acledaLinks[selectedQty]; }
        else { await sendToTelegram("COD (អ្នកភ្នំពេញ)"); alert("ជោគជ័យ! យើងនឹងតេទៅបញ្ជាក់ក្នុងពេលឆាប់ៗ។"); window.location.href = "https://t.me/+85586882636"; }
    }

    document.addEventListener("visibilitychange", function() { 
        if (document.visibilityState === 'visible' && isWaiting) { 
            sendToTelegram("បានបង់ប្រាក់រួចរាល់ (រង់ចាំការពិនិត្យ)"); isWaiting = false;
            window.location.href = "https://t.me/+85586882636"; 
        } 
    });

    async function sendToTelegram(status) {
        const phone = document.getElementById('phone').value, addr = document.getElementById('address').value;
        let details = ""; document.querySelectorAll('.type-input').forEach((input, idx) => { if (parseInt(input.value) > 0) details += `\n- ${types[idx]}: ${input.value}`; });
        const msg = `📦 *កម្ម៉ង់ថ្មី (${selectedArea})*\n📞 លេខ: ${phone}\n📍 ទីតាំង: ${addr}\n🛒 ទំនិញ: ${selectedQty}កំប៉ុង${details}\n💰 សរុប: ${prices[selectedQty].toLocaleString()}៛\n💳 ស្ថានភាព: ${status}`;
        const TOKEN = '8550988878:AAE8pkMzHJ87tbJZClJ4KkA8CfKtZVtPISo';
        for (const id of ['557314967', '1047599945']) { 
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ chat_id: id, text: msg, parse_mode: 'Markdown' }) }); 
        }
    }
</script>
</body>
</html>
