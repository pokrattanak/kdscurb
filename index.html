<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">
    <title>KD Natural Scrub - Order Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --aba: #005d7d; --gold: #b8860b; --dark: #2c3e50; }
        body { font-family: 'Kantumruy Pro', sans-serif; background: #ffffff; margin: 0; padding: 0; color: #333; overflow-x: hidden; }
        
        .header-container { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid #eee; background: #fffcf5; }
        .side-img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; border: 1px solid var(--gold); }
        .header-title { flex: 1; text-align: center; font-size: 14px; font-weight: bold; color: var(--dark); line-height: 1.4; }
        .header-title span { display: block; font-size: 16px; color: var(--gold); }

        .container { max-width: 450px; margin: auto; padding: 5px 10px; }
        .section { background: #fafafa; padding: 8px; border-radius: 12px; border: 1px solid #f0f0f0; margin-bottom: 6px; }
        .title { font-weight: bold; color: var(--gold); margin-bottom: 5px; font-size: 12px; display: block; }
        
        .qty-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
        .qty-btn { padding: 8px 1px; border: 1px solid #ddd; background: white; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 11px; transition: 0.2s; }
        .qty-btn.active { background: var(--gold); color: white; border-color: var(--gold); }

        .type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        .type-item { display: flex; justify-content: space-between; align-items: center; background: #fff; border: 1px solid #eee; padding: 3px 8px; border-radius: 6px; font-size: 12px; }
        .type-input { width: 35px; text-align: center; border: 1px solid #ccc; border-radius: 4px; padding: 3px; font-weight: bold; outline: none; }

        .location-selector { display: flex; gap: 5px; margin-bottom: 5px; }
        .loc-btn { flex: 1; padding: 10px 2px; border: 1px solid #ddd; border-radius: 8px; background: white; cursor: pointer; font-size: 10px; font-weight: bold; }
        .loc-btn.active { border-color: var(--gold); background: #fffcf0; color: var(--gold); }

        input { width: 100%; padding: 10px; margin: 2px 0; border-radius: 8px; border: 1px solid #eee; box-sizing: border-box; font-size: 13px; outline: none; }
        .btn-submit { color: white; border: none; padding: 14px; width: 100%; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-aba { background: var(--aba); }
        .btn-cod { background: #27ae60; }
        
        .hint-text { font-size: 10px; color: #d63031; text-align: center; margin-top: 5px; display: none; font-weight: bold; }

        #loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading-overlay"><div style="border: 4px solid #f3f3f3; border-top: 4px solid var(--gold); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;"></div></div>

<div class="header-container">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR61fIqIu9G7T-S0vEunwS1M8E6vH4-m0vW3w&s" class="side-img">
    <div class="header-title">
        <span>KDស្ក្រាប់ធម្មជាតិ</span>
        KD Natural Scrub
    </div>
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR61fIqIu9G7T-S0vEunwS1M8E6vH4-m0vW3w&s" class="side-img">
</div>

<div class="container">
    <div class="section">
        <span class="title">១. ជ្រើសរើសកញ្ចប់</span>
        <div class="qty-grid" id="qty-container"></div>
    </div>

    <div class="section">
        <span class="title">២. រើសប្រភេទស្ក្រាប់ (បញ្ចូលលេខ)</span>
        <div class="type-grid" id="type-container"></div>
    </div>

    <div class="section">
        <div class="location-selector">
            <button class="loc-btn" id="btn-pp" onclick="selectLoc('ភ្នំពេញ')">📍 ភ្នំពេញ (COD)</button>
            <button class="loc-btn" id="btn-province" onclick="selectLoc('ខេត្ត')">🚛 ខេត្ត (ABA)</button>
        </div>
        <input type="tel" id="phone" placeholder="លេខទូរស័ព្ទ *">
        <input type="text" id="address" placeholder="អាសយដ្ឋានដឹកជញ្ជូន *">
    </div>

    <div style="text-align: center; margin: 5px 0;">
        <b style="color: var(--dark); font-size: 18px;">សរុប៖ <span id="display-total">0</span> ៛</b>
    </div>
    
    <button id="main-submit-btn" class="btn-submit btn-aba" onclick="handleSubmit()">សូមជ្រើសរើសតំបន់</button>
    <div id="province-hint" class="hint-text">⚠️ បង់ប្រាក់រួច សូមចុចថយក្រោយវិញ ដើម្បីផ្ញើវិក្កយបត្រមកកាន់ Telegram ហាង</div>

    <div style="text-align:center; font-size:11px; margin-top:8px; color:#999;">
        ជំនួយ៖ <a href="tel:086882636" style="color:var(--gold); text-decoration:none;">086 882 636</a>
    </div>
</div>

<script>
    const prices = { 1: 16000, 5: 40000, 10: 68000, 12: 72000, 20: 120000, 30: 180000, 50: 280000, 60: 336000, 120: 624000 };
    const abaLinks = { 1: "https://pay.ababank.com/oRF8/t39mcrjz", 5: "https://pay.ababank.com/oRF8/b1o5fleo", 10: "https://pay.ababank.com/oRF8/8v5jzs1a", 12: "https://pay.ababank.com/oRF8/lls1tbur", 20: "https://pay.ababank.com/oRF8/680t8x4b", 30: "https://pay.ababank.com/oRF8/yqbo08ca", 50: "https://pay.ababank.com/oRF8/78hlhjpb", 60: "https://pay.ababank.com/oRF8/d77egydd", 120: "https://pay.ababank.com/oRF8/ckm2u0p2" };
    const types = ["កាហ្វេ", "ពន្លៃ", "ហាយឡាយ", "ប័រ", "អំពិលទុំ", "ស្រូវសាលី", "ស្ត្រប៊ឺរី"];
    let selectedQty = 0, selectedArea = "", isWaiting = false;

    const qtyDiv = document.getElementById('qty-container');
    Object.keys(prices).forEach(q => {
        const b = document.createElement('button'); b.className = 'qty-btn'; b.innerText = q + " កំប៉ុង";
        b.onclick = () => { selectedQty = parseInt(q); document.querySelectorAll('.qty-btn').forEach(btn => btn.classList.remove('active')); b.classList.add('active'); document.getElementById('display-total').innerText = prices[selectedQty].toLocaleString(); };
        qtyDiv.appendChild(b);
    });

    const typeDiv = document.getElementById('type-container');
    types.forEach(t => { typeDiv.innerHTML += `<div class="type-item"><span>${t}</span><input type="text" class="type-input" value="0" oninput="convertAndValidate(this)"></div>`; });

    function convertAndValidate(el) {
        const khNumbers = {'០':'0','១':'1','២':'2','៣':'3','៤':'4','៥':'5','៦':'6','７':'7','៨':'8','៩':'9'};
        let val = el.value;
        for (let key in khNumbers) { val = val.split(key).join(khNumbers[key]); }
        el.value = val.replace(/[^0-9]/g, '');
    }

    function selectLoc(area) {
        selectedArea = area;
        document.getElementById('btn-pp').classList.toggle('active', area === 'ភ្នំពេញ');
        document.getElementById('btn-province').classList.toggle('active', area === 'ខេត្ត');
        document.getElementById('province-hint').style.display = (area === 'ខេត្ត') ? 'block' : 'none';
        
        const btn = document.getElementById('main-submit-btn');
        btn.innerText = area === 'ភ្នំពេញ' ? "កម្ម៉ង់ឥឡូវ (បានឥវ៉ាន់ចាំឱ្យលុយ)" : "បង់ប្រាក់តាម ABA ឥឡូវនេះ";
        btn.className = area === 'ភ្នំពេញ' ? "btn-submit btn-cod" : "btn-submit btn-aba";
    }

    async function handleSubmit() {
        const phone = document.getElementById('phone').value, addr = document.getElementById('address').value;
        let current = 0; document.querySelectorAll('.type-input').forEach(i => current += parseInt(i.value) || 0);
        if (!selectedQty || current !== selectedQty || !phone || !addr || !selectedArea) return alert("សូមបំពេញព័ត៌មានឱ្យត្រឹមត្រូវ និងគ្រប់ចំនួនកំប៉ុង!");
        
        document.getElementById('loading-overlay').style.display = 'flex';
        if (selectedArea === 'ខេត្ត') { 
            isWaiting = true; 
            window.location.href = abaLinks[selectedQty]; 
        } else { 
            await sendToTelegram("COD (អ្នកភ្នំពេញ)"); 
            alert("ជោគជ័យ! យើងនឹងតេទៅបញ្ជាក់ក្នុងពេលឆាប់ៗ។"); 
            window.location.href = "https://t.me/+85586882636"; 
        }
    }

    // មុខងារពេលអតិថិជនបង់លុយរួចហើយចុច Back មកវិញ
    document.addEventListener("visibilitychange", function() { 
        if (document.visibilityState === 'visible' && isWaiting) { 
            sendToTelegram("បានបង់តាម ABA (រង់ចាំការបញ្ជាក់វិក្កយបត្រ)"); 
            isWaiting = false;
            document.getElementById('loading-overlay').style.display = 'none';
            alert("ការបង់ប្រាក់បានបញ្ជូន! សូមផ្ញើរូបភាពវិក្កយបត្រ (Screenshot) មកកាន់ Telegram ហាង។");
            window.location.href = "https://t.me/+85586882636"; 
        } 
    });

    async function sendToTelegram(status) {
        const phone = document.getElementById('phone').value, addr = document.getElementById('address').value;
        let details = ""; document.querySelectorAll('.type-input').forEach((input, idx) => { if (parseInt(input.value) > 0) details += `\n- ${types[idx]}: ${input.value}`; });
        const msg = `📦 *កម្ម៉ង់ថ្មី (${selectedArea})*\n📞 លេខ: ${phone}\n📍 ទីតាំង: ${addr}\n🛒 ទំនិញ: ${selectedQty}កំប៉ុង${details}\n💰 សរុប: ${prices[selectedQty].toLocaleString()}៛\n💳 ស្ថានភាព: ${status}`;
        const TOKEN = '8550988878:AAE8pkMzHJ87tbJZClJ4KkA8CfKtZVtPISo';
        const CHATS = ['557314967', '1047599945'];
        for (const id of CHATS) { await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ chat_id: id, text: msg, parse_mode: 'Markdown' }) }); }
    }
</script>
</body>
</html>
